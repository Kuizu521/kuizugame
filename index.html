<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像認識でURLへ飛ぶ</title>

  <!-- OpenCV.js（GitHub Pages内に置く） -->
  <script src="opencv.js"></script>

  <style>
    /* ====== 全体の背景 ====== */
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0f1a, #2b2b45);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ====== 中央カード ====== */
    .container {
      width: 90%;
      max-width: 480px;
      padding: 32px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    /* ====== タイトル ====== */
    h2 {
      margin-bottom: 25px;
      font-size: 1.7em;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* ====== ファイル選択ボタン ====== */
    #inputImage {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: #ffffff15;
      border: 2px dashed #ffffff40;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1em;
    }

    #inputImage:hover {
      background: #ffffff25;
      border-color: #ffffff70;
    }

    /* ====== ログ表示 ====== */
    #log {
      margin-top: 28px;
      padding: 18px;
      background: #00000035;
      border-radius: 12px;
      font-size: 0.95em;
      text-align: left;
      white-space: pre-line;
      line-height: 1.5em;
    }

    /* ====== アニメーション ====== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>写真を撮影してください</h2>

  <input type="file" id="inputImage" accept="image/*" capture="environment">

  <div id="log"></div>
</div>

<script src="script.js"></script>
</body>
</html>
